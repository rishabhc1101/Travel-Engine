server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to backend.
    # ${BACKEND_URL} is replaced by envsubst at container startup.
    # Examples:
    #   Cloud Run   → BACKEND_URL=https://travel-engine-api-xxxx.run.app
    #   Compose dev → BACKEND_URL=http://api:8080
    location /api/ {
        # Static proxy_pass — nginx resolves the hostname once at startup via
        # the container's /etc/resolv.conf (works in both Docker Compose and
        # Cloud Run without a hardcoded resolver).
        proxy_pass ${BACKEND_URL};

        # ── TLS / SNI ────────────────────────────────────────────────────────
        # Required when BACKEND_URL is https://… (Cloud Run).
        # Ignored automatically for plain http://… backends (Compose).
        proxy_ssl_server_name on;
        proxy_ssl_protocols   TLSv1.2 TLSv1.3;

        # ── Headers ──────────────────────────────────────────────────────────
        # Use $proxy_host (= hostname from proxy_pass), NOT $host.
        # Cloud Run validates the Host header against the service hostname.
        # Sending the FRONTEND hostname ($host) is what caused the 502.
        proxy_set_header Host              $proxy_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── HTTP/1.1 keepalive ───────────────────────────────────────────────
        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        # ── SSE / streaming support ──────────────────────────────────────────
        proxy_buffering       off;
        proxy_cache           off;
        proxy_read_timeout    3600s;
        proxy_connect_timeout 15s;
        proxy_send_timeout    60s;
    }

    # SPA fallback — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}


